# 그래스프 데이터베이스 — 부품별 피킹 자세 정의
# ================================================
#
# 각 부품에 대해 그리퍼가 부품을 잡는 로컬 자세를 정의한다.
# L4에서 부품의 월드 자세(T_part_world)가 나오면:
#   T_grasp_world = T_part_world @ T_grasp_local
# 로봇은 T_grasp_world로 이동하여 피킹한다.
#
# 좌표계:
#   - 부품 로컬: 부품 중심 = 원점, STL 기준 방향
#   - approach_axis: 그리퍼 접근 방향 (부품 로컬)
#   - grasp_depth_mm: 접근 축 방향으로 진입 깊이
#
# 그리퍼 파라미터:
#   - gripper_width_mm: 그리퍼 벌림 (부품 폭에 맞춤)
#   - gripper_force_N: 파지력 (SLA 레진 손상 방지)
#
# 초기: 대표 5종 정의 → 검증 후 30종 확장
# 부품 추가 시: 아래 형식 복사 후 수정
#
# ⚠️ 실제 값은 카메라 입고 + 로봇 티칭 후 실측으로 교정 필요
# ⚠️ 현재 값은 STL bbox 기반 추정치 (초기 개발/테스트용)

# ============================================================
# HCR-10L 로봇 스펙 (한솔코에버)
# ============================================================
# ⚠️ TBD 항목은 4/14 로봇 티칭 교육 후 실측값으로 교정
robot:
  model: "HCR-10L"
  manufacturer: "Hanwha (한화로보틱스, 구 한화정밀기계)"
  dof: 6
  payload_kg: 10
  reach_mm: 1300

  # 관절 제한 (deg) — 카탈로그 기준
  joint_limits_deg:
    j1: [-360, 360]
    j2: [-360, 360]
    j3: [-160, 160]
    j4: [-360, 360]
    j5: [-360, 360]
    j6: [-360, 360]

  # 최대 속도
  max_joint_speed_deg_s: 180       # J1~J3 (카탈로그)
  max_tcp_speed_mm_s: 1000         # 카탈로그 기준

  # TCP (Tool Center Point) 오프셋 — 그리퍼 장착 후 실측 필요
  tcp_offset_mm:
    x: 0           # TBD — 4/14 교육 후 실측
    y: 0           # TBD
    z: 0           # TBD (그리퍼 끝까지 Z 거리)
    rx: 0          # TBD (deg)
    ry: 0          # TBD
    rz: 0          # TBD

  # 통신
  modbus_port: 502
  modbus_slave_id: 1
  euler_convention: "ZYX"          # Rz→Ry→Rx (현재 modbus_server.py와 일치)

  # 작업 영역 제한 (로봇 베이스 기준, mm) — 빈 위치에 맞춰 교정 필요
  workspace_mm:
    x: [-600, 600]     # TBD — 빈 배치 후 실측
    y: [-600, 600]     # TBD
    z: [50, 500]       # TBD — 빈 바닥 높이 ~ 최대 리트릿 높이

  # 피킹 안전 파라미터
  safety:
    max_gripper_force_N: 40        # 병렬 그리퍼 최대 (SLA 레진 보호)
    min_z_mm: 50                   # 빈 바닥 충돌 방지 최소 Z (TBD)
    approach_speed_mm_s: 50        # 접근 속도 (느리게)
    retreat_speed_mm_s: 100        # 후퇴 속도
    pick_settle_ms: 200            # 파지 후 안정화 대기 시간

# ============================================================
# 기본 그리퍼 설정
# ============================================================
defaults:
  gripper_width_mm: 40        # 기본 벌림
  gripper_force_N: 15         # SLA 레진 기본 파지력 (낮게 시작)
  approach_speed_mm_s: 50     # 접근 속도
  retreat_height_mm: 100      # 피킹 후 상승 높이
  max_grasp_attempts: 2       # 최대 재시도 횟수

# ============================================================
# 부품별 그래스프 정의
# ============================================================

    description: "솔레노이드 블록 A (55×11.5×45mm)"
    approach_axis: [0, 0, -1]       # 위에서 아래로 접근 (-Z)
    grasp_center_mm: [0, 0, 0]      # 부품 중심 잡기
    grasp_depth_mm: 15              # 15mm 진입
    gripper_width_mm: 20            # 11.5mm 폭 + 여유
    gripper_force_N: 15
    grasp_type: "parallel"          # 평행 그리퍼


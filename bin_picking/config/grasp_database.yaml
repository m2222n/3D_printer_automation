# 그래스프 데이터베이스 — 부품별 피킹 자세 정의
# ================================================
#
# 각 부품에 대해 그리퍼가 부품을 잡는 로컬 자세를 정의한다.
# L4에서 부품의 월드 자세(T_part_world)가 나오면:
#   T_grasp_world = T_part_world @ T_grasp_local
# 로봇은 T_grasp_world로 이동하여 피킹한다.
#
# 좌표계:
#   - 부품 로컬: 부품 중심 = 원점, STL 기준 방향
#   - approach_axis: 그리퍼 접근 방향 (부품 로컬)
#   - grasp_depth_mm: 접근 축 방향으로 진입 깊이
#
# 그리퍼 파라미터:
#   - gripper_width_mm: 그리퍼 벌림 (부품 폭에 맞춤)
#   - gripper_force_N: 파지력 (SLA 레진 손상 방지)
#
# 초기: 대표 5종 정의 → 검증 후 30종 확장
# 부품 추가 시: 아래 형식 복사 후 수정
#
# ⚠️ 실제 값은 카메라 입고 + 로봇 티칭 후 실측으로 교정 필요
# ⚠️ 현재 값은 STL bbox 기반 추정치 (초기 개발/테스트용)

# 기본 그리퍼 설정 (HCR-10L 기본값)
defaults:
  gripper_width_mm: 40        # 기본 벌림
  gripper_force_N: 15         # SLA 레진 기본 파지력 (낮게 시작)
  approach_speed_mm_s: 50     # 접근 속도
  retreat_height_mm: 100      # 피킹 후 상승 높이
  max_grasp_attempts: 2       # 최대 재시도 횟수

# ============================================================
# 부품별 그래스프 정의
# ============================================================
parts:

  # --- SOL BLOCK 시리즈 (솔레노이드 블록) ---

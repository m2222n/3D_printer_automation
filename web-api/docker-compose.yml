# ===========================================
# Formlabs 원격제어 시스템 - Docker Compose
# ===========================================

version: '3.8'

services:
  # ===========================================
  # API 서버
  # ===========================================
  api:
    build: .
    container_name: formlabs-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - TZ=Asia/Seoul
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - formlabs-network
    # 로그 설정
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================
  # PostgreSQL (Phase 2에서 활성화)
